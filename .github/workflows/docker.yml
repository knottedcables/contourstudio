# Builds the container image on every push to main and publishes it to
# GitHub Container Registry as ghcr.io/knottedcables/contourstudio.
# Multi-arch: runs on Intel/AMD servers and ARM (Raspberry Pi, Apple Silicon).
name: Build and publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch: {}  # allows manual "Run workflow" from the Actions tab
  schedule:
    # Weekly rebuild (Mondays 06:00 UTC) so newly released base-OS security
    # patches land in the image even when the app code hasn't changed.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
