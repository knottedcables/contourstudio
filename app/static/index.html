<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contour Studio</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Contour Studio</h1>
    <span id="status" class="status"></span>
  </header>
  <main>
    <section id="map-pane">
      <div id="map"></div>
      <select id="basemap" title="Basemap layer">
        <option value="cyclosm">CyclOSM</option>
        <option value="osm">Standard</option>
        <option value="opentopo">OpenTopoMap</option>
      </select>
      <div id="search-wrap">
        <input id="search" type="search" placeholder="Search for a place… (Enter)" autocomplete="off">
        <ul id="search-results" hidden></ul>
      </div>
      <div id="selbox" title="Drag to move, corners to resize">
        <div class="handle nw"></div>
        <div class="handle ne"></div>
        <div class="handle sw"></div>
        <div class="handle se"></div>
      </div>
    </section>
    <aside id="sidebar">
      <div id="controls">
        <div class="control">
          <label>Contour interval <span class="val" id="interval-val"></span></label>
          <div class="row">
            <input type="range" id="interval" min="5" max="500" step="5" value="150">
            <span class="units-toggle">
              <label><input type="radio" name="units" value="ft" checked> ft</label>
              <label><input type="radio" name="units" value="m"> m</label>
            </span>
          </div>
        </div>
        <div class="control">
          <label>Smoothing <span class="val" id="smoothing-val"></span></label>
          <input type="range" id="smoothing" min="0" max="8" step="0.25" value="3">
        </div>
        <div class="control">
          <label>Simplification <span class="val" id="simplify-val"></span></label>
          <input type="range" id="simplify" min="0" max="1.5" step="0.05" value="0.2">
        </div>
        <div class="control">
          <label>Detail — min ring size <span class="val" id="min_ring-val"></span></label>
          <input type="range" id="min_ring" min="0" max="25" step="0.5" value="0.5">
        </div>
        <div class="control">
          <label>Line weight <span class="val" id="line_weight-val"></span></label>
          <input type="range" id="line_weight" min="0.1" max="1.5" step="0.05" value="0.4">
        </div>
        <label class="toggle"><input type="checkbox" id="water" checked> Water outlines</label>
      </div>
      <div id="export-panel">
        <div class="dims">
          <label>W <input type="number" id="width-mm" value="228.6" min="10" max="2000" step="0.1"> mm</label>
          <span class="x">×</span>
          <label>H <input type="number" id="height-mm" min="10" max="2000" step="0.1"> mm</label>
        </div>
        <div class="export-row">
          <button id="export-svg" class="secondary">Export SVG</button>
          <button id="export-png" class="secondary">Export PNG</button>
          <select id="dpi" title="PNG resolution">
            <option value="300">300 DPI</option>
            <option value="600" selected>600 DPI</option>
          </select>
        </div>
      </div>
      <button id="render-btn">Render preview</button>
      <div id="preview" class="empty">Select an area on the map, then render.</div>
    </aside>
  </main>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
