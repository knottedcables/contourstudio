# Contour Studio — ready-to-paste stack (Portainer / Dockhand / docker compose)
services:
  contour-studio:
    image: ghcr.io/knottedcables/contourstudio:latest
    # To build from source instead of pulling the prebuilt image,
    # replace the image line above with:
    #   build: .
    ports:
      - "8080:8080"
    volumes:
      # tile cache + saved designs. For NAS/host-path storage, use a path
      # instead, e.g.:
      #   - /mnt/nfs/contour-studio/data:/data
      # (and remove the named-volume block at the bottom)
      - contour-data:/data
    restart: unless-stopped

volumes:
  contour-data:
